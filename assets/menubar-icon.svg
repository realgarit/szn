<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Window frame -->
  <rect x="2" y="4" width="32" height="24" rx="3" stroke="#000000" stroke-width="2" fill="none"/>

  <!-- Title bar line -->
  <line x1="2" y1="11" x2="34" y2="11" stroke="#000000" stroke-width="2"/>

  <!-- Traffic lights (simplified dots) -->
  <circle cx="7" cy="7.5" r="1.4" fill="#000000"/>
  <circle cx="11" cy="7.5" r="1.4" fill="#000000"/>
  <circle cx="15" cy="7.5" r="1.4" fill="#000000"/>

  <!-- Resize arrows — centered in body -->
  <g stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="13" y1="25" x2="23" y2="15"/>
    <polyline points="19,15 23,15 23,19"/>
    <line x1="23" y1="25" x2="13" y2="15"/>
    <polyline points="17,25 13,25 13,21"/>
  </g>
</svg>
