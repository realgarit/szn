<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Resize arrows only — clean and simple -->
  <g stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Expand arrow (top-right) -->
    <line x1="10" y1="26" x2="26" y2="10"/>
    <polyline points="18,10 26,10 26,18"/>
    <!-- Shrink arrow (bottom-left) -->
    <line x1="26" y1="26" x2="10" y2="10"/>
    <polyline points="18,26 10,26 10,18"/>
  </g>
</svg>
