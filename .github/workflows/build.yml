name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build szn
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project szn.xcodeproj \
            -scheme szn \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Sign and prepare app bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APP="build/Build/Products/Release/szn.app"
          # Ad-hoc sign the bundle so macOS recognizes a stable identity
          codesign --force --deep --sign - "$APP"
          # Strip quarantine flag preemptively
          xattr -cr "$APP"
          mkdir -p dmg-staging
          cp -R "$APP" dmg-staging/

      - name: Create DMG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          brew install create-dmg
          create-dmg \
            --volname "szn" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "szn.app" 150 185 \
            --app-drop-link 450 185 \
            --hide-extension "szn.app" \
            --no-internet-enable \
            "szn-${GITHUB_REF_NAME}.dmg" \
            "dmg-staging/" || true

      - name: Upload DMG artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: szn-dmg
          path: "*.dmg"

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: szn-dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
          draft: false
