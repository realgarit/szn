name: szn
options:
  bundleIdPrefix: com.szn
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  szn:
    type: application
    platform: macOS
    sources:
      - szn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.szn.app
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: szn/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: szn
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
